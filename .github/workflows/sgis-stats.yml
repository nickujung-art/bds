name: SGIS 분기 통계 적재

on:
  schedule:
    - cron: '0 3 15 1,4,7,10 *' # 1·4·7·10월 15일 03:00 UTC (분기 첫 달)
  workflow_dispatch: {} # 수동 실행 지원

jobs:
  ingest:
    name: SGIS 인구·세대 적재
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: SGIS adm_cd 코드 검증 주의사항 출력
        run: echo "주의 - adm_cd 코드(48121 등)는 ASSUMED입니다. 첫 실행 시 출력 확인 필요."

      - name: Run SGIS ingestion script
        env:
          SGIS_CONSUMER_KEY: ${{ secrets.SGIS_CONSUMER_KEY }}
          SGIS_CONSUMER_SECRET: ${{ secrets.SGIS_CONSUMER_SECRET }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
        run: npx tsx scripts/ingest-sgis.ts

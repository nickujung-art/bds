name: transactions complex_id м—°кІ° (1нҡҢм„ұ)

on:
  workflow_dispatch: {}

jobs:
  link:
    name: transactionsвҶ”complexes мқјкҙ„ м—°кІ°
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Run link-transactions
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npx tsx scripts/link-transactions.ts

      - name: Upload unmatched log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unmatched-log
          path: .planning/phases/07-data-pipeline/unmatched-log.jsonl
          if-no-files-found: warn

      - name: мҷ„лЈҢ
        run: echo "м—°кІ° мҷ„лЈҢ вҖ” transactions н…Ңмқҙлё”м—җм„ң complex_id л№„мңЁ нҷ•мқё"
